name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore Orion.slnx

      - name: Build
        run: dotnet build Orion.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Orion.slnx --configuration Release --no-build --verbosity normal
