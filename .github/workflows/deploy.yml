name: deploy

on:
  push:
    branches: [main]
    # The frontend lives in web/ and ships via deploy-web.yml. A push that only
    # touches web/ has no backend impact, so skip the build/image/deploy here.
    paths-ignore: ['web/**', '.github/workflows/deploy-web.yml', '.github/workflows/web-ci.yml']
  pull_request:
    branches: [main]
    paths-ignore: ['web/**', '.github/workflows/deploy-web.yml', '.github/workflows/web-ci.yml']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore Orion.slnx

      - name: Build
        run: dotnet build Orion.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Orion.slnx --configuration Release --no-build --verbosity normal

  deploy:
    needs: build-and-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Log in to Azure (federated OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.AZURE_ACR_LOGIN_SERVER }}

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ secrets.AZURE_ACR_REPOSITORY }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ secrets.AZURE_ACR_REPOSITORY }}:${{ github.sha }} \
            --query "properties.latestRevisionName" -o tsv
